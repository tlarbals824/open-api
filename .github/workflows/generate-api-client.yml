name: Generate & Publish API Client

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            NPM_VERSION="${{ github.event.release.tag_name }}"
            NPM_VERSION="${NPM_VERSION#v}"
          else
            RAW_VERSION=$(grep '^version' backend/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')
            NPM_VERSION="${RAW_VERSION%-SNAPSHOT}"
          fi
          echo "version=$NPM_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm version: $NPM_VERSION"

      - name: Check if version already published
        id: check
        run: |
          PUBLISHED=$(npm view @ject-2-test/backend-api-client@${{ steps.version.outputs.version }} version 2>/dev/null || echo "")
          if [ "$PUBLISHED" = "${{ steps.version.outputs.version }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Version ${{ steps.version.outputs.version }} already published. Skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Grant execute permission for gradlew
        if: steps.check.outputs.skip == 'false'
        run: chmod +x backend/gradlew

      - name: Generate & Publish API Client
        if: steps.check.outputs.skip == 'false'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: cd backend && ./gradlew publishApiClient
